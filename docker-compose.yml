services:
  # Both bridges in ONE container: agy (Gemini) on :8000 and codex (gpt-5.5) on
  # :8001, launched by entrypoint-all.sh (the image default). If either bridge
  # process dies, the container exits and is restarted, bringing both back.
  bridges:
    build: .
    restart: unless-stopped
    init: true                       # tini as PID 1: reaps zombies (agy's tmux daemon reparents here)
    ports:
      - "8000:8000"   # agy / Gemini
      - "8001:8001"   # codex / gpt-5.5
    volumes:
      - agy-config:/root/.gemini    # agy auth + settings persist
      # codex gets its OWN independent login in this volume — run `codex login`
      # INSIDE the container once. Do NOT bind-mount or copy the host's auth.json
      # in: codex's ChatGPT OAuth refresh token ROTATES, so a shared token family
      # means whichever side refreshes first revokes the other's session. Host
      # and container must authenticate separately (multiple logins are allowed).
      - codex-config:/root/.codex   # codex auth + config + sessions (container-only)
      - ~/.ssh:/root/.ssh:ro
      - ./logs:/app/logs            # bridge logs + per-incident timeout dumps (host-readable)
      # Repos you want BOTH bridges to read: mount them under one parent...
      # - ~/dev/slit/slitled-platform:/repos/slitled-platform
      # - ~/dev/other-repo:/repos/other-repo
    environment:
      # Both bridges: a turn ends on inactivity (stall) OR the hard cap,
      # whichever first. Hard cap is 3 minutes — a request never blocks longer.
      - RESPONSE_STALL_TIMEOUT=90          # agy: give up after this long with no progress
      - RESPONSE_HARD_TIMEOUT=180          # agy: absolute max per turn (3 min)
      - RESPONSE_SLOW_DUMP_SECS=90         # agy: dump a diagnostic for any turn slower than this
      - STARTUP_TIMEOUT=60                 # agy: max wait for the CLI to become ready
      - CODEX_RESPONSE_STALL_TIMEOUT=90    # codex: give up after this long with no progress
      - CODEX_RESPONSE_HARD_TIMEOUT=180    # codex: absolute max per turn (3 min)
      - CODEX_SLOW_DUMP_SECS=90            # codex: dump a diagnostic for any turn slower than this
      - CODEX_STARTUP_TIMEOUT=60           # codex: max wait for the TUI to reach its idle prompt
      - LOG_DIR=/app/logs                  # bridges write logs + timeout dumps here
      - LOG_LEVEL=INFO
      - GIT_SSH_COMMAND=ssh -F /dev/null
      # ...and grant both CLIs access to that parent (--add-dir is repeatable):
      # - AGY_EXTRA_ARGS=--add-dir /repos
      # - CODEX_EXTRA_ARGS=--add-dir /repos

volumes:
  agy-config:
  codex-config:   # container's OWN codex login + config + sessions (independent; never seeded from host)
