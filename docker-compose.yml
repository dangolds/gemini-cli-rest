services:
  agy-rest:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - agy-config:/root/.gemini
      - ~/.ssh:/root/.ssh:ro
    environment:
      - RESPONSE_MAX_TIMEOUT=120
      - STARTUP_TIMEOUT=60
      - LOG_LEVEL=INFO
      - GIT_SSH_COMMAND=ssh -F /dev/null

volumes:
  agy-config:
